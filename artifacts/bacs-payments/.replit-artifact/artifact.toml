kind = "web"
previewPath = "/"
title = "BACS Payments"
version = "1.0.0"
id = "artifacts/bacs-payments"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21593

[services.development]
run = "pnpm --filter @workspace/bacs-payments run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bacs-payments", "run", "build" ]
publicDir = "artifacts/bacs-payments/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21593"
BASE_PATH = "/"
